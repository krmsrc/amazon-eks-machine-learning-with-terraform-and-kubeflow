# MCP Gateway Registry Stack - Workshop Values
#
# Simplified values for deploying on EKS with port-forward access.
# No external ingress, domain, or TLS required.
#
# Usage:
#   helm install mcp-gateway-registry -n mcp-gateway --create-namespace \
#     -f values.yaml .

global:
  domain: "localhost"

  authProvider:
    type: keycloak
    keycloak:
      adminUsername: "user"
      realm: "mcp-gateway"

  ingress:
    className: ""
    tls: false
    routingMode: path
    paths:
      authServer: /auth-server
      registry: /registry
      mcpgw: /mcpgw
      keycloak: /keycloak

mongodb:
  enabled: true
  user: mcpgateway
  password: "" # Generated at install time via --set

keycloak:
  create: true
  # Bitnami purged legacy tags from public.ecr.aws/bitnami/* in their Aug-2025
  # "Secure Images" migration. The chart-pinned tags still exist at
  # docker.io/bitnamilegacy/* — point both keycloak and its embedded postgres
  # sub-chart there.
  image:
    registry: docker.io
    repository: bitnamilegacy/keycloak
  postgresql:
    image:
      registry: docker.io
      repository: bitnamilegacy/postgresql
  global:
    security:
      allowInsecureImages: true
  httpRelativePath: /keycloak/
  extraEnvVars:
    - name: KC_PROXY
      value: edge
    - name: KC_PROXY_HEADERS
      value: xforwarded
  ingress:
    enabled: false
  nodeSelector: {}

keycloak-configure:
  enabled: true
  keycloak:
    realm: "mcp-gateway"
    adminUser: "user"

keycloakIngress:
  enabled: false

mongodb-configure:
  enabled: true

registry:
  app:
    replicas: 1
    # with-gateway makes the registry act as the gateway: its embedded nginx
    # auto-generates a per-server location block (with auth_request) whenever a
    # server is registered/enabled/disabled/deleted, so the registry actually
    # controls live MCP traffic. registry-only is catalog-only (no routing).
    deploymentMode: with-gateway
    registryMode: full
    skillSecurityScanEnabled: false
  ingress:
    enabled: false
  nodeSelector: {}

mcpgw:
  enabled: true
  app:
    replicas: 1
    embeddingsProvider: sentence-transformers
    embeddingsModelName: all-MiniLM-L6-v2
    embeddingsModelDimensions: "384"
  ingress:
    enabled: false
  nodeSelector: {}

auth-server:
  app:
    replicas: 1
    oauthStoreTokensInSession: false
  keycloak:
    enabled: true
    realm: "mcp-gateway"
  ingress:
    enabled: false
  nodeSelector: {}

nginxGateway:
  enabled: true
